<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kid Hub — English · Responsive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; font-family: 'Nunito', system-ui, sans-serif; background: #f4f1ec; }
    body { color: #1e293b; }
    .kh-bezel { border-radius: 38px; background: #1d1f24; padding: 8px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12); }
    .kh-bezel-screen { border-radius: 30px; overflow: hidden;
      width: 100%; height: 100%; position: relative; background: var(--color-shell-kid); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="browser-window.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="dashboard-v2-responsive.jsx"></script>
  <script type="text/babel" src="math.jsx"></script>
  <script type="text/babel" src="english.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#10b981",
      "phase": "result",
      "showHomework": true,
      "showFrame": true,
      "density": "roomy"
    }/*EDITMODE-END*/;

    const ACCENTS = {
      '#3b82f6': { hover: '#2563eb', soft: '#dbeafe', deep: '#1d4ed8' },
      '#10b981': { hover: '#059669', soft: '#d1fae5', deep: '#047857' },
      '#f43f5e': { hover: '#e11d48', soft: '#ffe4e6', deep: '#be123c' },
      '#8b5cf6': { hover: '#7c3aed', soft: '#ede9fe', deep: '#6d28d9' },
    };

    function Toast({ msg }) {
      if (!msg) return null;
      return <div className="kh-toast" key={msg.k}>{msg.text}</div>;
    }

    function Variant({ render }) {
      const [toast, setToast] = useState(null);
      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(null), 1600);
        return () => clearTimeout(t);
      }, [toast]);
      const onAction = (text) => setToast({ k: Date.now(), text });
      return (
        <div style={{ width: '100%', height: '100%', position: 'relative' }}>
          {render(onAction)}
          <Toast msg={toast} />
        </div>
      );
    }

    function MobileLandscapeBezel({ width, height, children }) {
      const inner = { width: width - 16, height: height - 16 };
      return (
        <div className="kh-bezel" style={{ width, height, position: 'relative' }}>
          <div className="kh-bezel-screen" style={inner}>{children}</div>
          <div style={{
            position: 'absolute', right: 4, top: '50%',
            width: 4, height: 90, borderRadius: 4,
            background: 'rgba(255,255,255,0.65)', transform: 'translateY(-50%)',
          }} />
        </div>
      );
    }

    function Framed({ kind, width, height, children, urlSuffix = '' }) {
      const useFrame = window.__useFrame;
      if (!useFrame) {
        return (
          <div style={{ width, height, borderRadius: 22, overflow: 'hidden',
            boxShadow: '0 20px 50px -20px rgba(15,23,42,0.25)' }}>{children}</div>
        );
      }
      if (kind === 'phone-p') return <IOSDevice width={width} height={height}>{children}</IOSDevice>;
      if (kind === 'phone-l') return <MobileLandscapeBezel width={width} height={height}>{children}</MobileLandscapeBezel>;
      if (kind === 'tablet')  return <AndroidDevice width={width} height={height}>{children}</AndroidDevice>;
      if (kind === 'desktop') return (
        <ChromeWindow width={width} height={height}
          tabs={[{ title: 'Kid Hub · ' + urlSuffix }]}
          activeIndex={0} url={'kidhub.app/' + urlSuffix.toLowerCase()}>
          {children}
        </ChromeWindow>
      );
      return children;
    }

    function fiveUp({ idPrefix, labelPrefix, urlSuffix, comps, tweaks, useFrame }) {
      const [PP, PL, TP, TL, D] = comps;
      const insets = useFrame ? { top: 52, bottom: 28 } : {};
      return [
        <DCArtboard key="pp" id={`${idPrefix}-pp`} label={`${labelPrefix} · Phone P · 390×844`} width={390} height={844}>
          <Framed kind="phone-p" width={390} height={844}>
            <Variant render={(a) => <PP tweaks={tweaks} onAction={a} insets={insets} />} />
          </Framed>
        </DCArtboard>,
        <DCArtboard key="pl" id={`${idPrefix}-pl`} label={`${labelPrefix} · Phone L · 844×390`} width={844} height={390}>
          <Framed kind="phone-l" width={844} height={390}>
            <Variant render={(a) => <PL tweaks={tweaks} onAction={a} />} />
          </Framed>
        </DCArtboard>,
        <DCArtboard key="tp" id={`${idPrefix}-tp`} label={`${labelPrefix} · Tablet P · 820×1180`} width={820} height={1180}>
          <Framed kind="tablet" width={820} height={1180}>
            <Variant render={(a) => <TP tweaks={tweaks} onAction={a} />} />
          </Framed>
        </DCArtboard>,
        <DCArtboard key="tl" id={`${idPrefix}-tl`} label={`${labelPrefix} · Tablet L · 1280×800`} width={1280} height={800}>
          <Framed kind="tablet" width={1280} height={800}>
            <Variant render={(a) => <TL tweaks={tweaks} onAction={a} />} />
          </Framed>
        </DCArtboard>,
        <DCArtboard key="d" id={`${idPrefix}-d`} label={`${labelPrefix} · Desktop · 1440×900`} width={1440} height={900}>
          <Framed kind="desktop" width={1440} height={900} urlSuffix={urlSuffix}>
            <Variant render={(a) => <D tweaks={tweaks} onAction={a} />} />
          </Framed>
        </DCArtboard>,
      ];
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      window.__useFrame = t.showFrame;

      useEffect(() => {
        const a = ACCENTS[t.accent] || ACCENTS['#10b981'];
        const r = document.documentElement.style;
        r.setProperty('--kh-accent', t.accent);
        r.setProperty('--kh-accent-hover', a.hover);
        r.setProperty('--kh-accent-soft', a.soft);
        r.setProperty('--kh-accent-deep', a.deep);
        r.setProperty('--kh-density', t.density === 'roomy' ? '1.15' : '1');
      }, [t.accent, t.density]);

      return (
        <React.Fragment>
          <DesignCanvas minScale={0.03} maxScale={2}>
            <DCSection id="hub" title="English Hub · /english"
              subtitle="Hub screen with 3 mini-game cards (English green). Toggle the homework banner.">
              {fiveUp({ idPrefix: 'hub', labelPrefix: 'Hub', urlSuffix: 'English',
                tweaks: t, useFrame: t.showFrame,
                comps: [EnglishHubPhoneP, EnglishHubPhoneL, EnglishHubTabletP, EnglishHubTabletL, EnglishHubDesktop] })}
            </DCSection>

            <DCSection id="alphabet" title="Alphabet Explorer · Nhận biết chữ"
              subtitle="Upper ↔ lower letter recognition. Big single-letter prompt, three letter buttons.">
              {fiveUp({ idPrefix: 'alphabet', labelPrefix: 'Alphabet', urlSuffix: 'English',
                tweaks: t, useFrame: t.showFrame,
                comps: [AlphaPhoneP, AlphaPhoneL, AlphaTabletP, AlphaTabletL, AlphaDesktop] })}
            </DCSection>

            <DCSection id="vocabulary" title="Word Safari · Ghép hình & từ"
              subtitle="Image-to-word vocabulary matching. Emoji prompt with English word answers.">
              {fiveUp({ idPrefix: 'vocab', labelPrefix: 'Safari', urlSuffix: 'English',
                tweaks: t, useFrame: t.showFrame,
                comps: [SafariPhoneP, SafariPhoneL, SafariTabletP, SafariTabletL, SafariDesktop] })}
            </DCSection>

            <DCSection id="phonics" title="Sound Hunt · Tìm âm chữ cái"
              subtitle="Phonics — pick the emoji whose word starts with the target letter sound.">
              {fiveUp({ idPrefix: 'phonics', labelPrefix: 'Sound', urlSuffix: 'English',
                tweaks: t, useFrame: t.showFrame,
                comps: [SoundPhoneP, SoundPhoneL, SoundTabletP, SoundTabletL, SoundDesktop] })}
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Game state">
              <TweakSelect label="Phase" value={t.phase}
                onChange={(v) => setTweak('phase', v)}
                options={[
                  { value: 'idle',    label: 'Chọn cấp độ (level select)' },
                  { value: 'playing', label: 'Đang chơi (playing)' },
                  { value: 'result',  label: 'Kết quả (result)' },
                ]} />
              <TweakToggle label="Show homework banner" value={t.showHomework}
                onChange={(v) => setTweak('showHomework', v)} />
            </TweakSection>
            <TweakSection label="Look">
              <TweakColor label="App accent" value={t.accent}
                onChange={(v) => setTweak('accent', v)}
                options={['#10b981', '#3b82f6', '#f43f5e', '#8b5cf6']} />
              <TweakRadio label="Density" value={t.density}
                onChange={(v) => setTweak('density', v)}
                options={[{ value: 'cozy', label: 'Cozy' }, { value: 'roomy', label: 'Roomy' }]} />
              <TweakToggle label="Show device frame" value={t.showFrame}
                onChange={(v) => setTweak('showFrame', v)} />
            </TweakSection>
            <TweakSection label="Tips">
              <div style={{ fontSize: 12, color: '#64748b', lineHeight: 1.45 }}>
                4 sections × 5 viewports = 20 artboards. The 'Phase' toggle swaps Playing ↔ Result
                for all 3 mini-games at once. Hub uses the English (emerald) brand color.
              </div>
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
