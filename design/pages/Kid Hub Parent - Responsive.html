<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kid Hub — Parent Mode · Responsive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; font-family: 'Nunito', system-ui, sans-serif; background: #f4f1ec; }
    body { color: #1e293b; }
    .kh-bezel { border-radius: 38px; background: #1d1f24; padding: 8px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12); }
    .kh-bezel-screen { border-radius: 30px; overflow: hidden; width: 100%; height: 100%;
      position: relative; background: #0f172a; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="browser-window.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="dashboard-v2-responsive.jsx"></script>
  <script type="text/babel" src="parent.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "pinState": "setup-confirm",
      "loginStep": "success",
      "activeManager": "schedule",
      "showFrame": true,
      "density": "cozy"
    }/*EDITMODE-END*/;

    const ACCENTS = {
      '#3b82f6': { hover: '#2563eb', soft: '#dbeafe', deep: '#1d4ed8' },
      '#10b981': { hover: '#059669', soft: '#d1fae5', deep: '#047857' },
    };

    function Toast({ msg }) {
      if (!msg) return null;
      return <div className="kh-toast" key={msg.k}>{msg.text}</div>;
    }

    function Variant({ render }) {
      const [toast, setToast] = useState(null);
      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(null), 1600);
        return () => clearTimeout(t);
      }, [toast]);
      const onAction = (text) => setToast({ k: Date.now(), text });
      return (
        <div style={{ width: '100%', height: '100%', position: 'relative' }}>
          {render(onAction)}
          <Toast msg={toast} />
        </div>
      );
    }

    function MobileLandscapeBezel({ width, height, dark = false, children }) {
      return (
        <div className="kh-bezel" style={{ width, height, position: 'relative' }}>
          <div style={{
            borderRadius: 30, overflow: 'hidden',
            width: width - 16, height: height - 16,
            background: dark ? '#0f172a' : '#f8fafc',
          }}>{children}</div>
          <div style={{
            position: 'absolute', right: 4, top: '50%',
            width: 4, height: 90, borderRadius: 4,
            background: 'rgba(255,255,255,0.65)', transform: 'translateY(-50%)',
          }} />
        </div>
      );
    }

    function FramedDark({ kind, width, height, children, tab = '' }) {
      const useFrame = window.__useFrame;
      if (!useFrame) {
        return (
          <div style={{ width, height, borderRadius: 22, overflow: 'hidden',
            boxShadow: '0 20px 50px -20px rgba(0,0,0,0.5)',
            background: '#0f172a',
          }}>{children}</div>
        );
      }
      if (kind === 'phone-p') return <IOSDevice width={width} height={height} dark>{children}</IOSDevice>;
      if (kind === 'phone-l') return <MobileLandscapeBezel width={width} height={height} dark>{children}</MobileLandscapeBezel>;
      if (kind === 'tablet')  return <AndroidDevice width={width} height={height} dark>{children}</AndroidDevice>;
      if (kind === 'desktop') return (
        <ChromeWindow width={width} height={height}
          tabs={[{ title: 'Kid Hub · Parent PIN' }]} activeIndex={0} url="kidhub.app/parent/pin">
          {children}
        </ChromeWindow>
      );
      return children;
    }

    function FramedLight({ kind, width, height, children, tab = '' }) {
      const useFrame = window.__useFrame;
      if (!useFrame) {
        return (
          <div style={{ width, height, borderRadius: 22, overflow: 'hidden',
            boxShadow: '0 20px 50px -20px rgba(15,23,42,0.25)',
            background: '#f8fafc',
          }}>{children}</div>
        );
      }
      if (kind === 'phone-p') return <IOSDevice width={width} height={height}>{children}</IOSDevice>;
      if (kind === 'phone-l') return <MobileLandscapeBezel width={width} height={height}>{children}</MobileLandscapeBezel>;
      if (kind === 'tablet')  return <AndroidDevice width={width} height={height}>{children}</AndroidDevice>;
      if (kind === 'desktop') return (
        <ChromeWindow width={width} height={height}
          tabs={[{ title: 'Kid Hub · Parent Dashboard' }]} activeIndex={0} url="kidhub.app/parent">
          {children}
        </ChromeWindow>
      );
      return children;
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      window.__useFrame = t.showFrame;

      useEffect(() => {
        const r = document.documentElement.style;
        r.setProperty('--kh-accent', '#3b82f6');
        r.setProperty('--kh-accent-hover', '#2563eb');
        r.setProperty('--kh-accent-soft', '#dbeafe');
        r.setProperty('--kh-accent-deep', '#1d4ed8');
        r.setProperty('--kh-density', t.density === 'roomy' ? '1.15' : '1');
      }, [t.density]);

      const pinInsets  = t.showFrame ? { top: 52, bottom: 28 } : {};
      const dashInsets = t.showFrame ? { top: 52, bottom: 28 } : {};

      return (
        <React.Fragment>
          <DesignCanvas minScale={0.04} maxScale={2}>

            {/* ── /parent/login ── */}
            <DCSection id="login" title="/parent/login · First-time Setup"
              subtitle="4-step onboarding: Welcome → Create PIN → Confirm PIN → Success. Dark shell throughout.">
              <DCArtboard id="login-pp" label="Login · Phone P · 390×844" width={390} height={844}>
                <FramedDark kind="phone-p" width={390} height={844}>
                  <Variant render={(a) => <LoginPhoneP tweaks={t} onAction={a} insets={pinInsets} />} />
                </FramedDark>
              </DCArtboard>
              <DCArtboard id="login-pl" label="Login · Phone L · 844×390" width={844} height={390}>
                <FramedDark kind="phone-l" width={844} height={390}>
                  <Variant render={(a) => <LoginPhoneL tweaks={t} onAction={a} />} />
                </FramedDark>
              </DCArtboard>
              <DCArtboard id="login-tp" label="Login · Tablet P · 820×1180" width={820} height={1180}>
                <FramedDark kind="tablet" width={820} height={1180}>
                  <Variant render={(a) => <LoginTabletP tweaks={t} onAction={a} />} />
                </FramedDark>
              </DCArtboard>
              <DCArtboard id="login-tl" label="Login · Tablet L · 1280×800" width={1280} height={800}>
                <FramedDark kind="tablet" width={1280} height={800}>
                  <Variant render={(a) => <LoginTabletL tweaks={t} onAction={a} />} />
                </FramedDark>
              </DCArtboard>
              <DCArtboard id="login-d" label="Login · Desktop · 1440×900" width={1440} height={900}>
                <FramedDark kind="desktop" width={1440} height={900}>
                  <Variant render={(a) => <LoginDesktop tweaks={t} onAction={a} />} />
                </FramedDark>
              </DCArtboard>
            </DCSection>

            {/* ── /parent/pin ── */}
            <DCSection id="pin" title="/parent/pin · PIN Entry"
              subtitle="Dark fullscreen shell. Handles: verify, setup-enter, setup-confirm, error, lockout.">
              <DCArtboard id="pin-pp" label="PIN · Phone P · 390×844" width={390} height={844}>
                <FramedDark kind="phone-p" width={390} height={844}>
                  <Variant render={(a) => <PinPhoneP tweaks={t} onAction={a} insets={pinInsets} />} />
                </FramedDark>
              </DCArtboard>
              <DCArtboard id="pin-pl" label="PIN · Phone L · 844×390" width={844} height={390}>
                <FramedDark kind="phone-l" width={844} height={390}>
                  <Variant render={(a) => <PinPhoneL tweaks={t} onAction={a} />} />
                </FramedDark>
              </DCArtboard>
              <DCArtboard id="pin-tp" label="PIN · Tablet P · 820×1180" width={820} height={1180}>
                <FramedDark kind="tablet" width={820} height={1180}>
                  <Variant render={(a) => <PinTabletP tweaks={t} onAction={a} />} />
                </FramedDark>
              </DCArtboard>
              <DCArtboard id="pin-tl" label="PIN · Tablet L · 1280×800" width={1280} height={800}>
                <FramedDark kind="tablet" width={1280} height={800}>
                  <Variant render={(a) => <PinTabletL tweaks={t} onAction={a} />} />
                </FramedDark>
              </DCArtboard>
              <DCArtboard id="pin-d" label="PIN · Desktop · 1440×900" width={1440} height={900}>
                <FramedDark kind="desktop" width={1440} height={900}>
                  <Variant render={(a) => <PinDesktop tweaks={t} onAction={a} />} />
                </FramedDark>
              </DCArtboard>
            </DCSection>

            {/* ── /parent ── */}
            <DCSection id="parent" title="/parent · Parent Dashboard"
              subtitle="Light shell. Schedule Manager (day tabs + period rows + hw toggle) + Grades Manager (subject scores + badge tiers).">
              <DCArtboard id="par-pp" label="Parent · Phone P · 390×844" width={390} height={844}>
                <FramedLight kind="phone-p" width={390} height={844}>
                  <Variant render={(a) => <ParentPhoneP tweaks={t} onAction={a} insets={dashInsets} />} />
                </FramedLight>
              </DCArtboard>
              <DCArtboard id="par-pl" label="Parent · Phone L · 844×390" width={844} height={390}>
                <FramedLight kind="phone-l" width={844} height={390}>
                  <Variant render={(a) => <ParentPhoneL tweaks={t} onAction={a} />} />
                </FramedLight>
              </DCArtboard>
              <DCArtboard id="par-tp" label="Parent · Tablet P · 820×1180" width={820} height={1180}>
                <FramedLight kind="tablet" width={820} height={1180}>
                  <Variant render={(a) => <ParentTabletP tweaks={t} onAction={a} />} />
                </FramedLight>
              </DCArtboard>
              <DCArtboard id="par-tl" label="Parent · Tablet L · 1280×800" width={1280} height={800}>
                <FramedLight kind="tablet" width={1280} height={800}>
                  <Variant render={(a) => <ParentTabletL tweaks={t} onAction={a} />} />
                </FramedLight>
              </DCArtboard>
              <DCArtboard id="par-d" label="Parent · Desktop · 1440×900" width={1440} height={900}>
                <FramedLight kind="desktop" width={1440} height={900}>
                  <Variant render={(a) => <ParentDesktop tweaks={t} onAction={a} />} />
                </FramedLight>
              </DCArtboard>
            </DCSection>

          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Login step">
              <TweakSelect label="Step" value={t.loginStep}
                onChange={(v) => setTweak('loginStep', v)}
                options={[
                  { value: 'email',   label: 'Bước 1 — Đăng nhập Email/Mật khẩu' },
                  { value: 'welcome', label: 'Bước 2 — Giới thiệu Parent Mode' },
                  { value: 'create',  label: 'Bước 3 — Tạo mã PIN' },
                  { value: 'confirm', label: 'Bước 4 — Xác nhận PIN' },
                  { value: 'success', label: 'Bước 5 — Hoàn tất ✅' },
                ]} />
            </TweakSection>
            <TweakSection label="PIN screen state">
              <TweakSelect label="PIN state" value={t.pinState}
                onChange={(v) => setTweak('pinState', v)}
                options={[
                  { value: 'verify',         label: 'Xác nhận PIN (nhập 2/4)' },
                  { value: 'verify-error',   label: 'Sai mã PIN (shake)' },
                  { value: 'locked',         label: 'Đã khóa tạm thời' },
                  { value: 'setup-enter',    label: 'Lần đầu — tạo PIN mới' },
                  { value: 'setup-confirm',  label: 'Lần đầu — xác nhận PIN' },
                ]} />
            </TweakSection>
            <TweakSection label="Dashboard tab">
              <TweakRadio label="Active manager (phone-P)" value={t.activeManager}
                onChange={(v) => setTweak('activeManager', v)}
                options={[
                  { value: 'schedule', label: 'Lịch' },
                  { value: 'grades',   label: 'Điểm' },
                ]} />
            </TweakSection>
            <TweakSection label="Look">
              <TweakRadio label="Density" value={t.density}
                onChange={(v) => setTweak('density', v)}
                options={[{ value: 'cozy', label: 'Cozy' }, { value: 'roomy', label: 'Roomy' }]} />
              <TweakToggle label="Show device frame" value={t.showFrame}
                onChange={(v) => setTweak('showFrame', v)} />
            </TweakSection>
            <TweakSection label="Tips">
              <div style={{ fontSize: 12, color: '#64748b', lineHeight: 1.5 }}>
                <strong>PIN screen</strong> — click keypad digits for toast. 5 states via the dropdown above.<br/><br/>
                <strong>Parent dashboard</strong> — click subject dropdowns, time fields, 📖 homework toggles, 🗑️ delete, score inputs — all fire action toasts. "Lưu" saves, "Lưu ✓" shows saved state.
              </div>
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
