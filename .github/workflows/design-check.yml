# .github/workflows/design-check.yml
#
# Runs the full design automation check suite on every push to main
# and on every pull request. Fails the build if any check exits non-zero.
# Uploads drift-report.html as a downloadable workflow artifact.

name: Design Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  design-check:
    name: Design System Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run design checks
        run: pnpm design:check

      - name: Generate drift report
        if: always()
        run: pnpm design:report

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: design-drift-report
          path: design/drift-report.html
          retention-days: 14
