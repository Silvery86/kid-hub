<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kid Hub — Schedule · Responsive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/styles.css" />
  <style>
    html, body { margin: 0; padding: 0; font-family: 'Nunito', system-ui, sans-serif; background: #f4f1ec; }
    body { color: #1e293b; }
    .kh-bezel { border-radius: 38px; background: #1d1f24; padding: 8px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12); }
    .kh-bezel-screen { border-radius: 30px; overflow: hidden;
      width: 100%; height: 100%; position: relative; background: var(--color-shell-kid); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../components/design-canvas.jsx"></script>
  <script type="text/babel" src="../components/android-frame.jsx"></script>
  <script type="text/babel" src="../components/ios-frame.jsx"></script>
  <script type="text/babel" src="../components/browser-window.jsx"></script>
  <script type="text/babel" src="../components/tweaks-panel.jsx"></script>

  <script type="text/babel" src="../components/shared.jsx"></script>
  <script type="text/babel" src="../components/dashboard-v2-responsive.jsx"></script>
  <script type="text/babel" src="../components/schedule.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#3b82f6",
      "time": "morning",
      "showFrame": true,
      "density": "cozy"
    }/*EDITMODE-END*/;

    const ACCENTS = {
      '#3b82f6': { hover: '#2563eb', soft: '#dbeafe', deep: '#1d4ed8' },
      '#10b981': { hover: '#059669', soft: '#d1fae5', deep: '#047857' },
      '#f43f5e': { hover: '#e11d48', soft: '#ffe4e6', deep: '#be123c' },
      '#8b5cf6': { hover: '#7c3aed', soft: '#ede9fe', deep: '#6d28d9' },
    };

    function Toast({ msg }) {
      if (!msg) return null;
      return <div className="kh-toast" key={msg.k}>{msg.text}</div>;
    }

    function Variant({ render }) {
      const [toast, setToast] = useState(null);
      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(null), 1600);
        return () => clearTimeout(t);
      }, [toast]);
      const onAction = (text) => setToast({ k: Date.now(), text });
      return (
        <div style={{ width: '100%', height: '100%', position: 'relative' }}>
          {render(onAction)}
          <Toast msg={toast} />
        </div>
      );
    }

    function MobileLandscapeBezel({ width, height, children }) {
      const inner = { width: width - 16, height: height - 16 };
      return (
        <div className="kh-bezel" style={{ width, height, position: 'relative' }}>
          <div className="kh-bezel-screen" style={inner}>{children}</div>
          <div style={{
            position: 'absolute', right: 4, top: '50%',
            width: 4, height: 90, borderRadius: 4,
            background: 'rgba(255,255,255,0.65)', transform: 'translateY(-50%)',
          }} />
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        const a = ACCENTS[t.accent] || ACCENTS['#3b82f6'];
        const r = document.documentElement.style;
        r.setProperty('--kh-accent', t.accent);
        r.setProperty('--kh-accent-hover', a.hover);
        r.setProperty('--kh-accent-soft', a.soft);
        r.setProperty('--kh-accent-deep', a.deep);
        r.setProperty('--kh-density', t.density === 'roomy' ? '1.15' : '1');
      }, [t.accent, t.density]);

      const useFrame = t.showFrame;

      const renderPhoneP = (onAction) => (
        <SchedulePhonePortrait tweaks={t} time={t.time} onAction={onAction}
          insets={useFrame ? { top: 52, bottom: 28 } : {}} />
      );
      const renderPhoneL = (onAction) => <SchedulePhoneLandscape tweaks={t} time={t.time} onAction={onAction} />;
      const renderTabP   = (onAction) => <ScheduleTabletPortrait tweaks={t} time={t.time} onAction={onAction} />;
      const renderTabL   = (onAction) => <ScheduleTabletLandscape tweaks={t} time={t.time} onAction={onAction} />;
      const renderDesk   = (onAction) => <ScheduleDesktop tweaks={t} time={t.time} onAction={onAction} />;

      return (
        <React.Fragment>
          <DesignCanvas minScale={0.05} maxScale={2}>
            <DCSection id="mobile" title="Mobile"
              subtitle="Phone portrait + landscape · Lịch học">
              <DCArtboard id="phone-portrait" label="Phone · 390×844" width={390} height={844}>
                {useFrame ? (
                  <IOSDevice width={390} height={844}>
                    <Variant render={renderPhoneP} />
                  </IOSDevice>
                ) : (
                  <div style={{ width: 390, height: 844, borderRadius: 24, overflow: 'hidden',
                    boxShadow: '0 20px 50px -20px rgba(15,23,42,0.25)' }}>
                    <Variant render={(a) => <SchedulePhonePortrait tweaks={t} time={t.time} onAction={a} />} />
                  </div>
                )}
              </DCArtboard>
              <DCArtboard id="phone-landscape" label="Phone · 844×390" width={844} height={390}>
                {useFrame ? (
                  <MobileLandscapeBezel width={844} height={390}>
                    <Variant render={renderPhoneL} />
                  </MobileLandscapeBezel>
                ) : (
                  <div style={{ width: 844, height: 390, borderRadius: 22, overflow: 'hidden',
                    boxShadow: '0 20px 50px -20px rgba(15,23,42,0.25)' }}>
                    <Variant render={renderPhoneL} />
                  </div>
                )}
              </DCArtboard>
            </DCSection>

            <DCSection id="tablet" title="Tablet"
              subtitle="Portrait + landscape">
              <DCArtboard id="tablet-portrait" label="Tablet · 820×1180" width={820} height={1180}>
                {useFrame ? (
                  <AndroidDevice width={820} height={1180}>
                    <Variant render={renderTabP} />
                  </AndroidDevice>
                ) : (
                  <div style={{ width: 820, height: 1180, borderRadius: 22, overflow: 'hidden',
                    boxShadow: '0 20px 50px -20px rgba(15,23,42,0.25)' }}>
                    <Variant render={renderTabP} />
                  </div>
                )}
              </DCArtboard>
              <DCArtboard id="tablet-landscape" label="Tablet · 1280×800" width={1280} height={800}>
                {useFrame ? (
                  <AndroidDevice width={1280} height={800}>
                    <Variant render={renderTabL} />
                  </AndroidDevice>
                ) : (
                  <div style={{ width: 1280, height: 800, borderRadius: 22, overflow: 'hidden',
                    boxShadow: '0 20px 50px -20px rgba(15,23,42,0.25)' }}>
                    <Variant render={renderTabL} />
                  </div>
                )}
              </DCArtboard>
            </DCSection>

            <DCSection id="desktop" title="Desktop"
              subtitle="Chrome window 1440×900">
              <DCArtboard id="desktop" label="Desktop · 1440×900" width={1440} height={900}>
                {useFrame ? (
                  <ChromeWindow width={1440} height={900}
                    tabs={[{ title: 'Kid Hub · Lịch học' }]}
                    activeIndex={0} url="kidhub.app/schedule">
                    <Variant render={renderDesk} />
                  </ChromeWindow>
                ) : (
                  <div style={{ width: 1440, height: 900, borderRadius: 18, overflow: 'hidden',
                    boxShadow: '0 30px 60px -30px rgba(15,23,42,0.3)' }}>
                    <Variant render={renderDesk} />
                  </div>
                )}
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Look">
              <TweakColor label="Accent color" value={t.accent}
                onChange={(v) => setTweak('accent', v)}
                options={['#3b82f6', '#10b981', '#f43f5e', '#8b5cf6']} />
              <TweakRadio label="Density" value={t.density}
                onChange={(v) => setTweak('density', v)}
                options={[{ value: 'cozy', label: 'Cozy' }, { value: 'roomy', label: 'Roomy' }]} />
              <TweakToggle label="Show device frame" value={t.showFrame}
                onChange={(v) => setTweak('showFrame', v)} />
            </TweakSection>
            <TweakSection label="State">
              <TweakSelect label="Time of day" value={t.time}
                onChange={(v) => setTweak('time', v)}
                options={[
                  { value: 'morning', label: 'Trong giờ học · 09:15' },
                  { value: 'break',   label: 'Giờ nghỉ · 08:55' },
                  { value: 'after',   label: 'Sau giờ học · 14:00' },
                ]} />
            </TweakSection>
            <TweakSection label="Tips">
              <div style={{ fontSize: 12, color: '#64748b', lineHeight: 1.45 }}>
                Same Lịch học design across 5 viewports. Click any cell or period to inspect.
                On desktop, clicking a cell updates the right-side detail.
              </div>
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
